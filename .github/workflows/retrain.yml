name: Retrain AQI Model

on:
  workflow_dispatch:   # manual trigger
  schedule:
    # Run every 40 days at midnight UTC
    - cron: '0 0 1 * *'

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run retrain script
        run: |
          python retrain.py

      - name: Commit updated model and history
        run: |
           git config --global user.name "github-actions[bot]"
           git config --global user.email "github-actions[bot]@users.noreply.github.com"
           git add xgboost_aqi_model.pkl data/AQI\(With\ Features\).csv
           git commit -m "Automated retrain: update model and history" || echo "No changes to commit"
           git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main

